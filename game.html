<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push-Up Challenge</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
            background: #1a1a1a;
        }


        #canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

      
        .top-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(235, 110, 30, 0.92) 0%,
                rgba(235, 110, 30, 0.80) 20%,
                rgba(235, 110, 30, 0.45) 40%,
                rgba(235, 110, 30, 0.10) 60%,
                rgba(235, 110, 30, 0.00) 75%
            );
            pointer-events: none;
            z-index: 5;
        }


        .bottom-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(
                to top,
                rgba(240, 120, 40, 0.85) 0%,
                rgba(240, 120, 40, 0.60) 40%,
                rgba(240, 120, 40, 0.00) 100%
            );
            pointer-events: none;
            z-index: 5;
        }


        .top-content {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 24px;
            gap: 0;
        }

        .thomas-more-logo {
            width: min(55vw, 220px);
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
            margin-bottom: 4px;
        }

        
        .challenge-logo {
            width: min(75vw, 300px);
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.35));
        }

        
        .subtitle {
            font-size: clamp(0.9em, 3.5vw, 1.05em);
            font-weight: 900;
            font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
            color: #1a1a1a;
            -webkit-text-stroke: 2px white;
            paint-order: stroke fill;
            text-shadow: none;
            letter-spacing: 0;
            margin-top: -4px;
        }

      
        .bottom-stats {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 0 28px 36px 28px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-line {
            font-size: clamp(2em, 8vw, 2.8em);
            font-weight: 900;
            font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
            color: #1a1a1a;
            -webkit-text-stroke: 4px white;
            paint-order: stroke fill;
            text-shadow: none;
            line-height: 1.2;
            letter-spacing: 0;
        }

        
        #label-container {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 4px;
            opacity: 0.75;
        }

        #label-container div {
            border-radius: 6px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 0.7em;
            padding: 3px 8px;
            backdrop-filter: blur(4px);
        }

        
        #flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.15s ease;
        }
    </style>
</head>
<body>

    <div id="flash"></div>

    
    <canvas id="canvas"></canvas>

   
    <div class="top-overlay"></div>
    <div class="bottom-overlay"></div>


    <div class="top-content">
        <img src="images/logo.png" alt="Thomas More" class="thomas-more-logo">
        <img src="images/It2.png" alt="Push-Up Challenge" class="challenge-logo" onerror="this.style.display='none'">
        <p class="subtitle">Positioneer jezelf op de mat.</p>
    </div>


    <div id="label-container"></div>


    <div class="bottom-stats">
        <div class="stat-line">Tijd over: <span id="timer">60</span>s</div>
        <div class="stat-line">Push-ups: <span id="pushupCount">0</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <script>
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/yXB9hl_GA/";
        let model, webcam, ctx, labelContainer, maxPredictions;

        let pushupCount = 0;
        let wasDown = false;
        const CONFIDENCE_THRESHOLD = 0.75;
        let photoTaken = false;

        const pushupDisplay = document.getElementById('pushupCount');

        function takePhoto() {
            if (photoTaken) return;
            photoTaken = true;

            const flash = document.getElementById('flash');
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 150);

            const photoData = document.getElementById('canvas').toDataURL('image/jpeg', 0.8);
            sessionStorage.setItem('gamePhoto', photoData);
            console.log("Foto genomen op 30 seconden!");
        }

        function countPushup() {
            pushupCount++;
            pushupDisplay.textContent = pushupCount;
        }

        function detectPushup(prediction) {
            const top = [...prediction].sort((a, b) => b.probability - a.probability)[0];
            if (top.probability < CONFIDENCE_THRESHOLD) return;
            const pos = top.className.trim().toLowerCase();
            if (pos === "down") {
                wasDown = true;
            } else if (pos === "up" && wasDown) {
                countPushup();
                wasDown = false;
            }
        }

        async function init() {
            model = await tmPose.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            const canvas = document.getElementById("canvas");
            const size = Math.max(window.innerWidth, window.innerHeight);
            webcam = new tmPose.Webcam(size, size, true);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx = canvas.getContext("2d");

            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            for (let i = 0; i < maxPredictions; i++) {
                const pct = (prediction[i].probability * 100).toFixed(1);
                labelContainer.childNodes[i].textContent =
                    prediction[i].className + ": " + pct + "%";
            }

            detectPushup(prediction);
            drawPose(pose);
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                const canvas = document.getElementById("canvas");
                const cw = canvas.width;
                const ch = canvas.height;
                const sw = webcam.canvas.width;
                const sh = webcam.canvas.height;

                // Cover-fit: scale webcam to fill canvas
                const scale = Math.max(cw / sw, ch / sh);
                const dw = sw * scale;
                const dh = sh * scale;
                const dx = (cw - dw) / 2;
                const dy = (ch - dh) / 2;

                ctx.drawImage(webcam.canvas, dx, dy, dw, dh);

                if (pose) {
                    const minPartConfidence = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }

        window.addEventListener("load", init);
        window.addEventListener("resize", () => {
            const canvas = document.getElementById("canvas");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

    <script src="app.js"></script>

</body>
</html>
