<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klassement</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(180deg, #E85A0A 0%, #F47B30 30%, #F9A96A 65%, #FCD5B0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 160px;
            gap: 0px;
            font-family: 'Arial Black', 'Impact', sans-serif;
        }

     
        .logo-wrapper {
            margin-bottom: 10px;
        }
        .thomas-more-logo {
            width: min(55vw, 220px);
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
            margin-bottom: 4px;
        }

        .banner-wrapper {
            margin-bottom: 6px;
        }
        .challenge-logo {
            width: min(75vw, 300px);
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.35));
        }

        h1 {
            color: #1a1a1a;
            font-size: 2.8em;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 10px 0 18px;
            font-family: 'Arial Black', Impact, sans-serif;
        }

        .lijst {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .entry {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            color: #1a1a1a;
        }

        .foto {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.7);
            flex-shrink: 0;
        }

        .geen-foto {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            background: rgba(200,200,200,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            flex-shrink: 0;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .datum {
            font-size: 0.85em;
            font-weight: 700;
            color: #333;
            font-family: Arial, sans-serif;
        }

        .score {
            font-size: 1.8em;
            font-weight: 900;
            color: #1a1a1a;
            font-family: 'Arial Black', Impact, sans-serif;
            letter-spacing: 1px;
            margin-left: auto;
            padding-right: 4px;
        }

        .leeg {
            color: #333;
            opacity: 0.8;
            text-align: center;
            margin-top: 40px;
            font-size: 1.1em;
            font-family: Arial, sans-serif;
        }

   
        .instructie-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 20px 20px;
            gap: 8px;
        }

        .instructie-bottom img.gesture-icon {
            width: 44px;
            filter: brightness(0);
        }

        .instructie-bottom p {
            font-family: 'Arial Black', Impact, sans-serif;
            font-weight: 900;
            font-size: 1em;
            color: #1a1a1a;
            text-align: center;
            line-height: 1.3;
        }

        
        .instructie {
            background-color: #E85A0A;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 150px;
            border-radius: 20px;
            color: white;
            align-items: center;
            position: fixed;
            bottom: 30px;
            right: 20px;
            padding: 12px;
        }
        .instructie a {
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 1em;
        }
        .instructie img { width: 40px; }

        .wis-btn {
            background: rgba(255,255,255,0.25);
            border: 1.5px solid rgba(255,255,255,0.6);
            color: #1a1a1a;
            border-radius: 20px;
            padding: 7px 20px;
            font-size: 0.85em;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-weight: 700;
            margin-bottom: 14px;
        }

        #status {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.4);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            white-space: nowrap;
            font-family: Arial, sans-serif;
            display: none;
        }

        #webcam-container {
            position: fixed;
            bottom: 200px;
            right: 20px;
            opacity: 0;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>


    <div class="logo-wrapper">
        <img src="images/logo.png" alt="Thomas More" class="thomas-more-logo">
    </div>

    <div class="banner-wrapper">
        <img src="images/It2.png" alt="Push-Up Challenge" class="challenge-logo" onerror="this.style.display='none'">
    </div>

    <h1>Klassement</h1>

    <button class="wis-btn" onclick="wisKlassement()">Klassement wissen</button>

    <div class="lijst" id="lijst"></div>

    <div class="instructie-bottom">
        <img class="gesture-icon" src="images/Hands.svg" alt="Spreid armen" onerror="this.outerHTML='<span style=font-size:2em>🙌</span>'">
        <p>Spreid je armen uit om<br>opnieuw te beginnen.</p>
    </div>

    <script>
        function laadKlassement() {
            const lijst = document.getElementById('lijst');
            const data = JSON.parse(localStorage.getItem('klassement') || '[]');

            if (data.length === 0) {
                lijst.innerHTML = '<p class="leeg">Nog geen scores. Speel een ronde!</p>';
                return;
            }

            lijst.innerHTML = '';
            data.forEach((entry, i) => {
                const fotoHtml = entry.photo
                    ? `<img class="foto" src="${entry.photo}" alt="foto">`
                    : `<div class="geen-foto">🙂</div>`;

                lijst.innerHTML += `
                    <div class="entry">
                        ${fotoHtml}
                        <div class="info">
                            <span class="datum">${entry.date}</span>
                        </div>
                        <span class="score">${entry.score}</span>
                    </div>
                `;
            });
        }

        function wisKlassement() {
            if (confirm('Ben je zeker dat je het klassement wil wissen?')) {
                localStorage.removeItem('klassement');
                laadKlassement();
            }
        }

        laadKlassement();
    </script>

</body>
</html>
