<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpagina</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #E8521A 0%, #F47C3C 35%, #FAC49A 70%, #FDE8D8 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Logo at top */
        .logo-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            width: 500px;
            height: auto;
        }

        /* Main description text */
        .description {
            margin-top: 40px;
            text-align: center;
            padding: 0 30px;
            font-size: 1.25em;
            font-weight: 900;
            color: #1a1a1a;
            line-height: 1.35;
            max-width: 320px;
        }

        /* Arms icon and start instruction */
        .start-section {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .start-section img {
            width: 70px;
            height: auto;
        }

        .start-label {
            font-size: 1.25em;
            font-weight: 900;
            color: #1a1a1a;
            text-align: center;
            line-height: 1.3;
        }

        /* Hidden webcam */
        #webcam-container {
            position: absolute;
            top: 20px;
            right: 20px;
            opacity: 0;
            pointer-events: none;
        }

        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.45);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 0.95em;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- Thomas More logo -->
    <div class="logo-container">
        <img src="images/logo.png" alt="Thomas More">
    </div>

    <!-- Instruction text -->
    <p class="description">Doe zo veel mogelijk push-ups binnen 60 seconden.</p>

    <!-- Arms-up icon and start gesture instruction -->
    <div class="start-section">
        <img src="images/Arms Up.png" alt="Spreid je armen uit">
        <p class="start-label">Spreid je armen uit om te<br>starten.</p>
    </div>

    <!-- Hidden webcam container -->
    <div id="webcam-container"></div>

    <!-- Status indicator -->
    <div id="status">Webcam laden...</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script>
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/yXB9hl_GA/";
        let model, webcam;
        const CONFIDENCE_THRESHOLD = 0.85;
        let startHoldFrames = 0;
        const HOLD_FRAMES_NEEDED = 15;

        async function init() {
            model = await tmPose.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");

            webcam = new tmPose.Webcam(200, 200, true);
            await webcam.setup();
            await webcam.play();

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            document.getElementById("status").textContent = "Spreid je armen uit om te beginnen";

            window.requestAnimationFrame(loop);
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            const startClass = prediction.find(p => p.className.trim().toLowerCase() === "start");
            if (startClass && startClass.probability >= CONFIDENCE_THRESHOLD) {
                startHoldFrames++;
                const pct = Math.min(100, Math.round((startHoldFrames / HOLD_FRAMES_NEEDED) * 100));
                document.getElementById("status").textContent = `Start gebaar gedetecteerd... ${pct}%`;
                if (startHoldFrames >= HOLD_FRAMES_NEEDED) {
                    window.location.href = "game.html";
                }
            } else {
                startHoldFrames = 0;
                document.getElementById("status").textContent = "Spreid je armen uit om te beginnen";
            }
        }

        window.addEventListener("load", init);
    </script>

</body>
</html>
